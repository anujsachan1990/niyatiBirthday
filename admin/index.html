<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP Admin · Niyati Turns One</title>
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/app.css">
    <link rel="stylesheet" href="../css/sonner.css">
</head>

<body class="bg-[#F9F6F0] text-[#1F1D1B] min-h-screen">
    <header class="border-b border-[#1F1D1B]/10">
        <div class="max-w-[1400px] mx-auto px-6 md:px-10 py-6 flex items-center justify-between gap-4">
            <div>
                <p class="font-mono-nb text-[11px] uppercase tracking-[0.28em] text-[#5C564F]">Private dashboard</p>
                <h1 class="font-heading text-3xl md:text-4xl mt-1">RSVP responses</h1>
            </div>
            <a href="../index.html"
                class="nb-border nb-shadow-sm nb-shadow-hover bg-[#1F1D1B] text-[#F9F6F0] font-mono-nb text-[11px] uppercase tracking-[0.28em] px-5 py-3 rounded-full">
                Back to site
            </a>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto px-6 md:px-10 py-10">
        <section id="admin-login" class="max-w-md mx-auto nb-border rounded-2xl bg-white p-8 md:p-10 nb-shadow-lg">
            <p class="font-mono-nb text-[11px] uppercase tracking-[0.28em] text-[#5C564F]">Admin sign in</p>
            <h2 class="font-heading text-3xl mt-2">Who is coming?</h2>
            <p class="mt-4 font-body text-[#5C564F]">Sign in with the Supabase admin account you created for this
                project.</p>

            <form id="admin-login-form" class="admin-login-form mt-8">
                <div class="admin-field">
                    <label for="admin-email" class="block font-mono-nb text-[11px] uppercase tracking-[0.28em]">Email</label>
                    <input id="admin-email" type="email" required
                        class="w-full nb-border rounded-xl bg-white px-4 py-3 font-body text-lg focus:outline-none focus:nb-shadow-sm"
                        placeholder="you@example.com">
                </div>
                <div class="admin-field">
                    <label for="admin-password"
                        class="block font-mono-nb text-[11px] uppercase tracking-[0.28em]">Password</label>
                    <input id="admin-password" type="password" required
                        class="w-full nb-border rounded-xl bg-white px-4 py-3 font-body text-lg focus:outline-none focus:nb-shadow-sm"
                        placeholder="Your admin password">
                </div>
                <p id="admin-login-error" class="hidden font-mono-nb text-xs uppercase tracking-[0.2em] text-red-700"></p>
                <button type="submit"
                    class="admin-submit inline-flex items-center gap-2 nb-border nb-shadow nb-shadow-hover bg-[#1F1D1B] text-[#F9F6F0] font-mono-nb text-xs uppercase tracking-[0.28em] px-8 py-4 rounded-full">
                    Sign in
                </button>
            </form>
        </section>

        <section id="admin-dashboard" class="admin-dashboard hidden">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                    <p class="font-mono-nb text-[11px] uppercase tracking-[0.28em] text-[#5C564F]">Live summary</p>
                    <h2 class="font-heading text-3xl mt-1">Guest overview</h2>
                </div>
                <div class="flex flex-wrap items-center gap-3">
                    <label for="admin-filter" class="font-mono-nb text-[11px] uppercase tracking-[0.28em]">Filter</label>
                    <select id="admin-filter"
                        class="nb-border rounded-full bg-white px-4 py-2 font-mono-nb text-xs uppercase tracking-[0.2em]">
                        <option value="all">All responses</option>
                        <option value="yes">Coming only</option>
                        <option value="no">Declined only</option>
                    </select>
                    <button id="admin-refresh" type="button"
                        class="nb-border nb-shadow-sm nb-shadow-hover bg-[#C1D5C9] font-mono-nb text-[11px] uppercase tracking-[0.28em] px-5 py-3 rounded-full">
                        Refresh
                    </button>
                    <button id="admin-logout" type="button"
                        class="nb-border nb-shadow-sm nb-shadow-hover bg-white font-mono-nb text-[11px] uppercase tracking-[0.28em] px-5 py-3 rounded-full">
                        Sign out
                    </button>
                </div>
            </div>

            <div id="admin-stats" class="admin-stats"></div>

            <div class="admin-table-panel nb-border rounded-2xl bg-white overflow-hidden nb-shadow-lg">
                <div class="overflow-x-auto">
                    <table class="admin-table w-full text-left">
                        <thead class="bg-[#F9F6F0]">
                            <tr>
                                <th class="px-4 py-4 font-mono-nb text-[11px] uppercase tracking-[0.28em]">Name</th>
                                <th class="px-4 py-4 font-mono-nb text-[11px] uppercase tracking-[0.28em]">Email</th>
                                <th class="px-4 py-4 font-mono-nb text-[11px] uppercase tracking-[0.28em]">Status</th>
                                <th class="px-4 py-4 font-mono-nb text-[11px] uppercase tracking-[0.28em] text-center">Guests</th>
                                <th class="px-4 py-4 font-mono-nb text-[11px] uppercase tracking-[0.28em]">Message</th>
                                <th class="px-4 py-4 font-mono-nb text-[11px] uppercase tracking-[0.28em]">Submitted</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body"></tbody>
                    </table>
                </div>
                <p id="admin-empty" class="hidden px-6 py-10 font-body text-[#5C564F]">No RSVPs match this filter yet.</p>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/admin.js"></script>
</body>

</html>
