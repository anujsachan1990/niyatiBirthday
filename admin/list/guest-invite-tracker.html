<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f7f5f2">
  <title>Guest Invite Tracker</title>
  <style>
    :root {
      --bg: #f7f5f2;
      --bg-elevated: #ffffff;
      --bg-muted: #efece7;
      --text: #1a1a1a;
      --text-muted: #5c574f;
      --border: #ddd7ce;
      --accent: #2f6b4f;
      --accent-soft: #e4f0e9;
      --danger: #8b3a3a;
      --danger-soft: #f5e8e8;
      --shadow: 0 1px 3px rgba(26, 26, 26, 0.06), 0 4px 14px rgba(26, 26, 26, 0.04);
      --radius: 12px;
      --font: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      --sticky-offset: 0px;
    }

    [data-theme="dark"] {
      --bg: #161513;
      --bg-elevated: #221f1c;
      --bg-muted: #2c2925;
      --text: #f3efe8;
      --text-muted: #a9a29a;
      --border: #3d3832;
      --accent: #6db892;
      --accent-soft: #24352c;
      --danger: #e08a8a;
      --danger-soft: #3a2828;
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.35), 0 6px 18px rgba(0, 0, 0, 0.25);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      min-height: 100vh;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .app {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 1rem 1rem 3rem;
    }

    .sticky-top {
      position: sticky;
      top: 0;
      z-index: 40;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      margin: 0 -1rem;
      padding: 0.85rem 1rem 0.9rem;
    }

    .header-row {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem 1rem;
      margin-bottom: 0.85rem;
    }

    .title-block h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 1.75rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .title-block p {
      margin: 0.2rem 0 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text);
      border-radius: 999px;
      padding: 0.45rem 0.9rem;
      font-size: 0.82rem;
      font-weight: 600;
      box-shadow: var(--shadow);
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
    }

    .btn:hover {
      background: var(--bg-muted);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn:focus-visible,
    .field:focus-visible,
    .qty-btn:focus-visible,
    .pill:focus-visible,
    .toggle:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .btn-primary:hover {
      opacity: 0.9;
      background: var(--text);
    }

    [data-theme="dark"] .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #102018;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.5rem;
    }

    @media (min-width: 720px) {
      .summary {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }
    }

    .stat {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.55rem 0.65rem;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .stat-label {
      display: block;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat-value {
      display: block;
      margin-top: 0.15rem;
      font-size: 1.2rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .toolbar {
      display: grid;
      gap: 0.75rem;
      margin: 1rem 0;
    }

    .search-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .search-wrap {
      flex: 1 1 220px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      border-radius: 999px;
      padding: 0.55rem 0.95rem;
      box-shadow: var(--shadow);
    }

    .toggles {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      border-radius: 999px;
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      user-select: none;
    }

    .toggle input {
      accent-color: var(--accent);
      width: 1rem;
      height: 1rem;
    }

    .toggle.is-active {
      background: var(--accent-soft);
      border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
      color: var(--accent);
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .pill {
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      border-radius: 999px;
      padding: 0.35rem 0.75rem;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .pill[aria-pressed="true"] {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    [data-theme="dark"] .pill[aria-pressed="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: #102018;
    }

    .table-panel {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .guest-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .guest-table th {
      text-align: left;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 700;
      padding: 0.55rem 0.35rem;
      background: var(--bg-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .guest-table td {
      padding: 0.35rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .guest-table tr:last-child td {
      border-bottom: none;
    }

    .guest-table tbody tr {
      transition: background 0.15s ease;
    }

    .guest-table tbody tr:hover {
      background: color-mix(in srgb, var(--bg-muted) 55%, transparent);
    }

    .guest-table tbody tr.is-invited {
      background: color-mix(in srgb, var(--accent-soft) 70%, transparent);
    }

    .guest-table tbody tr.is-invited:hover {
      background: color-mix(in srgb, var(--accent-soft) 90%, transparent);
    }

    .col-cat { width: 10%; }
    .col-family { width: 12%; }
    .col-people { width: 18%; }
    .col-adults { width: 7%; }
    .col-kids { width: 7%; }
    .col-invite { width: 9%; }
    .col-rsvp { width: 9%; }
    .col-notes { width: 18%; }
    .col-actions { width: 5%; }

    .field {
      width: 100%;
      max-width: 100%;
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 6px;
      padding: 0.3rem 0.4rem;
      min-height: 1.9rem;
      font-size: 0.82rem;
    }

    textarea.field {
      resize: vertical;
      min-height: 1.9rem;
      line-height: 1.3;
    }

    .qty {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.15rem;
    }

    .qty .field {
      width: 2.25rem;
      flex: 0 0 2.25rem;
      text-align: center;
      padding-left: 0.1rem;
      padding-right: 0.1rem;
      -moz-appearance: textfield;
    }

    .qty .field::-webkit-outer-spin-button,
    .qty .field::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .qty-btn {
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-muted);
      font-weight: 700;
      font-size: 0.85rem;
      line-height: 1;
      flex-shrink: 0;
      padding: 0;
    }

    .qty-btn:hover {
      background: var(--border);
    }

    .invite-cell {
      text-align: center;
    }

    .invite-check {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      min-height: 1.9rem;
      padding: 0.2rem 0.4rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--bg);
      cursor: pointer;
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .invite-check input {
      width: 0.95rem;
      height: 0.95rem;
      accent-color: var(--accent);
      cursor: pointer;
      margin: 0;
    }

    .invite-check.is-on {
      background: var(--accent-soft);
      border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
      color: var(--accent);
    }

    .status-pill {
      display: inline-block;
    }

    .btn-delete {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: color-mix(in srgb, var(--danger) 30%, var(--border));
      box-shadow: none;
      padding: 0.25rem 0.45rem;
      font-size: 0.72rem;
      width: 100%;
    }

    .btn-delete:hover {
      background: color-mix(in srgb, var(--danger-soft) 70%, var(--danger) 12%);
    }

    .empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-muted);
      margin: 0;
    }

    .list-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.65rem;
    }

    .list-toolbar h2 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
    }

    .btn-save {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn-save:hover {
      opacity: 0.92;
      background: var(--accent);
    }

    .btn-save:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .save-status {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      min-height: 1.2em;
    }

    .save-status.is-dirty {
      color: #9a6b1f;
    }

    .save-status.is-ok {
      color: var(--accent);
    }

    .save-status.is-error {
      color: var(--danger);
    }

    .auth-panel {
      max-width: 420px;
      margin: 2rem auto;
      padding: 1.5rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .auth-panel h2 {
      margin: 0 0 0.35rem;
      font-size: 1.35rem;
    }

    .auth-panel p {
      margin: 0 0 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .auth-panel .field-group {
      display: grid;
      gap: 0.25rem;
      margin-bottom: 0.75rem;
    }

    .auth-panel label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      font-weight: 700;
    }

    .auth-error {
      color: var(--danger);
      font-size: 0.82rem;
      font-weight: 600;
      margin: 0 0 0.75rem;
    }

    .auth-error[hidden],
    .app-main[hidden],
    .auth-panel[hidden] {
      display: none !important;
    }

    .list-toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .list-footer {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    @media (max-width: 900px) {
      .col-cat { width: 11%; }
      .col-people { width: 16%; }
      .col-notes { width: 14%; }
      .col-adults,
      .col-kids { width: 5%; }
      .status-pill {
        display: none;
      }
      .invite-check {
        padding: 0.25rem;
        border-radius: 8px;
      }
      .qty-btn {
        display: none;
      }
      .qty .field {
        width: 100%;
        flex: 1 1 auto;
      }
    }

    .back-link {
      display: inline-flex;
      margin-bottom: 0.35rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .back-link:hover {
      color: var(--text);
    }

    @media print {
      .sticky-top {
        position: static;
        backdrop-filter: none;
        border: none;
        margin: 0;
        padding: 0 0 0.75rem;
      }

      .header-actions,
      .toolbar,
      .btn-delete,
      .qty-btn,
      .back-link {
        display: none !important;
      }

      body {
        background: white;
        color: black;
      }

      .table-panel,
      .stat {
        box-shadow: none;
        border-color: #ccc;
      }

      .guest-table tbody tr {
        break-inside: avoid;
      }

      .field,
      .invite-check {
        border: none;
        background: transparent;
        padding-left: 0;
        padding-right: 0;
      }

      .summary {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="sticky-top">
      <div class="header-row">
        <div class="title-block">
          <a class="back-link" href="../index.html">← Back to admin</a>
          <h1>Guest Invite Tracker</h1>
          <p>Manage families, invitations, and RSVPs in one place.</p>
          <p class="save-status" id="save-status" aria-live="polite">Sign in to load and save.</p>
        </div>
        <div class="header-actions">
          <button type="button" class="btn" id="theme-toggle" aria-pressed="false">Dark mode</button>
          <button type="button" class="btn" id="export-csv" hidden>Export CSV</button>
          <button type="button" class="btn btn-save" id="save-all" hidden disabled>Save</button>
          <button type="button" class="btn btn-primary" id="add-family" hidden>+ Add row</button>
          <button type="button" class="btn" id="logout-btn" hidden>Sign out</button>
        </div>
      </div>

      <section class="summary" aria-label="Guest summary" id="summary" hidden></section>
    </div>

    <section class="auth-panel" id="auth-panel">
      <h2>Admin sign in</h2>
      <p>Sign in with the same Supabase admin account used for RSVP admin. Changes are saved to the database.</p>
      <form id="login-form">
        <div class="field-group">
          <label for="login-email">Email</label>
          <input class="field" id="login-email" type="email" required autocomplete="username" placeholder="you@example.com">
        </div>
        <div class="field-group">
          <label for="login-password">Password</label>
          <input class="field" id="login-password" type="password" required autocomplete="current-password" placeholder="Your admin password">
        </div>
        <p class="auth-error" id="login-error" hidden></p>
        <button type="submit" class="btn btn-primary">Sign in</button>
      </form>
    </section>

    <div class="app-main" id="app-main" hidden>
      <section class="toolbar" aria-label="Filters and search">
        <div class="search-row">
          <div class="search-wrap">
            <label class="sr-only" for="search">Search by person or family name</label>
            <input type="search" id="search" placeholder="Search by person or family name…" autocomplete="off">
          </div>
          <div class="toggles">
            <label class="toggle" id="toggle-invited">
              <input type="checkbox" id="invited-only">
              <span>Invitation sent only</span>
            </label>
            <label class="toggle" id="toggle-pending">
              <input type="checkbox" id="pending-only">
              <span>Pending RSVP only</span>
            </label>
            <button type="button" class="btn" id="reset-filters">Reset filters</button>
          </div>
        </div>

        <div class="pills" role="group" aria-label="Category filter" id="category-pills"></div>
      </section>

      <section aria-label="Guest families">
        <div class="list-toolbar">
          <h2>Guest list</h2>
          <div class="list-toolbar-actions">
            <button type="button" class="btn btn-save" id="save-all-mid" disabled>Save</button>
            <button type="button" class="btn btn-primary" id="add-row">+ Add row</button>
          </div>
        </div>
        <div class="table-panel" id="guest-list">
          <p class="empty">Loading…</p>
        </div>
        <div class="list-footer">
          <button type="button" class="btn btn-primary" id="add-row-bottom">+ Add row</button>
          <button type="button" class="btn btn-save" id="save-all-bottom" disabled>Save</button>
        </div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/supabase-client.js"></script>
  <script src="../../js/guest-invite-tracker.js"></script>
</body>
</html>
